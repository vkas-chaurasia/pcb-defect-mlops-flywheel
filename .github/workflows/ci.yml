name: MLOps Flywheel CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-pipeline:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        clean: false

    - name: Setup Safe CI Environment (macOS)
      run: |
        python3 -m venv .venv_ci_tools
        .venv_ci_tools/bin/pip install setuptools
        echo "$(pwd)/.venv_ci_tools/bin" >> $GITHUB_PATH
        brew install pkg-config cairo pango libffi

    - name: Setup CML
      uses: iterative/setup-cml@v2

    - name: Create Virtual Environment
      run: |
        python3 -m venv .venv_ci
        echo "$GITHUB_WORKSPACE/.venv_ci/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Infrastructure is Running
      run: docker compose -f docker/docker-compose.yml up -d

    - name: Pull Data from DVC
      env:
        MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
        AWS_ACCESS_KEY_ID: rustfsadmin
        AWS_SECRET_ACCESS_KEY: rustfsadmin
      run: dvc pull data/raw.dvc -f

    - name: Execute Total Trust Pipeline and Post Report
      env:
        REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        MLFLOW_TRACKING_URI: http://localhost:5556
        MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
        AWS_ACCESS_KEY_ID: rustfsadmin
        AWS_SECRET_ACCESS_KEY: rustfsadmin
        MLFLOW_EXPERIMENT_NAME: pcb-defect-production
      run: |
        # 1. Force a fresh, system-verified training run
        echo "📡 MLflow Tracking URI: $MLFLOW_TRACKING_URI"
        dvc repro -f train
        
        # 2. Execute the API-driven Auditor (Creates report.md with local assets)
        dvc repro report
        
        # 3. Append Performance Comparison
        git fetch origin main:main
        echo -e "\n## Performance vs Main\n" >> report.md
        dvc metrics diff --md --all main >> report.md
        
        # 4. Push official results to the vault
        dvc push
        
        # 5. Post the Unified High-Fidelity Report (CML automatically handles local images)
        cml comment create --watermark-title="mlops-report" report.md

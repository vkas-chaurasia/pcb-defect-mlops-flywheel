name: MLOps Flywheel CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-pipeline:
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        clean: false

    - name: Setup Safe CI Environment (macOS)
      run: |
        python3 -m venv .venv_ci_tools
        .venv_ci_tools/bin/pip install setuptools
        echo "$(pwd)/.venv_ci_tools/bin" >> $GITHUB_PATH
        brew install pkg-config cairo pango libffi

    - name: Setup CML
      uses: iterative/setup-cml@v2

    - name: Create Virtual Environment
      run: |
        python3 -m venv .venv_ci
        echo "$GITHUB_WORKSPACE/.venv_ci/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Clean and Start Infrastructure
      run: |
        docker compose -f docker/docker-compose.yml down -v || true
        mkdir -p dvc-storage/mlflow-history
        chmod -R 777 dvc-storage
        docker compose -f docker/docker-compose.yml up -d
        echo "Waiting for MLflow API and RustFS to be ready..."
        for i in {1..30}; do
          if curl -s http://localhost:5555/api/2.0/mlflow/experiments/list > /dev/null && curl -s http://localhost:9000/minio/health/live > /dev/null; then
            echo "Infrastructure is fully ready!"
            exit 0
          fi
          echo "...still waiting for services..."
          sleep 5
        done
        echo "Infrastructure timed out. Docker logs:"
        docker logs mlflow
        exit 1

    - name: Pull Data from DVC
      env:
        MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
        AWS_ACCESS_KEY_ID: rustfsadmin
        AWS_SECRET_ACCESS_KEY: rustfsadmin
      run: dvc pull data/raw.dvc -f

    - name: Reproduce Pipeline
      env:
        MLFLOW_TRACKING_URI: http://localhost:5555
        MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
        AWS_ACCESS_KEY_ID: rustfsadmin
        AWS_SECRET_ACCESS_KEY: rustfsadmin
      run: |
        echo "MLflow Tracking URI: $MLFLOW_TRACKING_URI"
        echo "S3 Endpoint: $MLFLOW_S3_ENDPOINT_URL"
        rm -f dvc.lock .dvc/tmp/lock || true
        dvc repro
        dvc push

    - name: Generate Metrics Report and Post to GitHub PR
      env:
        REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## MLOps Flywheel: Training Report" > report.md
        echo "The automated training run has completed successfully. Below is a detailed performance breakdown." >> report.md
        
        # Performance Diff
        git fetch origin main:main
        echo "### Metrics vs Main" >> report.md
        dvc metrics diff --md --all main >> report.md
        
        # Deep Links to the Original MLflow Run
        if [ -f mlflow_run.txt ]; then
          source mlflow_run.txt
          echo "---" >> report.md
          echo "* [View Original Training Run]($RUN_URL)" >> report.md
          echo "* [View Full Experiment Suite]($EXP_URL)" >> report.md
          echo "---" >> report.md
        fi
        
        # Visual Artifacts
        if [ -f last_run_path.txt ]; then
          ABS_RUN_PATH=$(cat last_run_path.txt)
          # Convert absolute path to relative for CML
          REL_RUN_PATH=$(echo $ABS_RUN_PATH | sed "s|$GITHUB_WORKSPACE/||")
          echo "### Visual Analysis" >> report.md
          
          echo "#### Training Loss and Metrics Curves" >> report.md
          cml publish "$REL_RUN_PATH/results.png" --md >> report.md
          
          echo "#### F1 and Precision-Recall Curves" >> report.md
          cml publish "$REL_RUN_PATH/BoxF1_curve.png" --md >> report.md
          cml publish "$REL_RUN_PATH/BoxPR_curve.png" --md >> report.md
          
          echo "#### Confusion Matrix" >> report.md
          cml publish "$REL_RUN_PATH/confusion_matrix.png" --md >> report.md
        fi
        
        # Update existing comment or create new one with watermark to prevent duplicates
        cml comment create --watermark-title="mlops-report" report.md

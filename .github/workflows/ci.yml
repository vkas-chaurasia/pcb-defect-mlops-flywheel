name: MLOps Flywheel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-pipeline:
    runs-on: self-hosted

    steps:
    - name: Cleanup Locked Docker Folders
      run: |
        # Use a tiny Docker container to delete root-owned folders that the runner can't touch
        for folder in label_studio_data mlruns dvc-storage rustfs_logs; do
          if [ -d "$folder" ]; then
            echo "Cleaning up $folder..."
            docker run --rm -v $(pwd):/workspace alpine rm -rf "/workspace/$folder"
          fi
        done

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        clean: false

    - name: Create Virtual Environment
      run: |
        python3 -m venv .venv_ci
        echo "$GITHUB_WORKSPACE/.venv_ci/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure Infrastructure is Running
      run: docker compose -f docker/docker-compose.yml up -d

    - name: Pull Data from DVC
      run: dvc pull -f

    - name: Reproduce Pipeline
      run: |
        dvc repro
        dvc push

    - name: Setup CML (Continuous Machine Learning)
      uses: iterative/setup-cml@v2

    - name: Generate Metrics Report and Post to GitHub PR
      env:
        REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## DVC Pipeline Metrics" >> report.md
        echo "Here are the results of the latest automated training run. View the full visual charts in [MLflow](http://localhost:5555)." >> report.md
        git fetch --depth=1 origin main:main
        echo "### Performance Diff (vs main)" >> report.md
        dvc metrics diff --show-md main >> report.md
        cml comment create report.md

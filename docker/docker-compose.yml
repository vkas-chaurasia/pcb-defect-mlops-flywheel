services:
  # Production MLflow (Only started in CI/CD via --profile prod)
  mlflow_prod:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_prod
    profiles: ["prod"]
    ports:
      - "5555:5000"
    working_dir: /mlflow
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - MLFLOW_S3_ENDPOINT_URL=http://rustfs:9000
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - ../mlflow-history-prod:/mlflow/data
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow/data --default-artifact-root mlflow-artifacts:/ --serve-artifacts

  # Development MLflow (Default - Started locally)
  mlflow_dev:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_dev
    ports:
      - "5556:5000"
    working_dir: /mlflow
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - MLFLOW_S3_ENDPOINT_URL=http://rustfs:9000
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - ../local-mlflow-history:/mlflow/data
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow/data --default-artifact-root mlflow-artifacts:/ --serve-artifacts

  # Human-in-the-Loop Labeling (Default - Started locally)
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8080:8080"
    volumes:
      - ../label_studio_data:/label-studio/data
      - ../data:/label-studio/data/projects-data
    environment:
      - DJANGO_DB=default
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data/projects-data

  # S3 Compatible Storage (Default - Shared)
  rustfs:
    image: minio/minio:latest
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=rustfsadmin
      - MINIO_ROOT_PASSWORD=rustfsadmin
    volumes:
      - ../dvc-storage:/data
    command: server /data --console-address ":9001"

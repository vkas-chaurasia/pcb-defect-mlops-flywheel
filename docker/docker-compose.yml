version: '3.8'

services:
  # Experiment Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0

  # Human-in-the-Loop Labeling
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8080:8080"
    volumes:
      - ../label_studio_data:/label-studio/data

  # Inference Server (Placeholder for now)
  mlserver:
    image: seldonio/mlserver:latest
    container_name: mlserver
    ports:
      - "8081:8080"
    volumes:
      - ../models:/models
    environment:
      - MLSERVER_MODEL_REPOSITORY_ROOT=/models
  # S3-compatible Remote Storage (Apache 2.0)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
    volumes:
      - ../dvc-storage:/data
      - ./rustfs_logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

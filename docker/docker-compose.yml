services:
  # Experiment Tracking (DEVELOPER PLAYGROUND - Local Storage)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_dev
    ports:
      - "5555:5000"
    working_dir: /mlflow
    volumes:
      - ../dvc-storage/mlflow-history:/mlflow/data
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow/data --default-artifact-root /mlflow/data/artifacts --serve-artifacts

  # --- PRODUCTION / VALIDATION ENVIRONMENT (S3 / RustFS Storage) ---
  mlflow-prod:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_prod
    ports:
      - "5556:5000"
    working_dir: /mlflow
    volumes:
      - ../dvc-storage/mlflow-prod-history:/mlflow/data
      - ../dvc-storage:/dvc-storage
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - MLFLOW_S3_ENDPOINT_URL=http://rustfs:9000
      - MLFLOW_S3_IGNORE_TLS=true
    # --serve-artifacts enables the master-grade artifact proxy
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow/data --default-artifact-root mlflow-artifacts:/ --serve-artifacts

  # Human-in-the-Loop Labeling
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8080:8080"
    volumes:
      - ../label_studio_data:/label-studio/data
      - ../data:/label-studio/data/projects-data
    environment:
      - LABEL_STUDIO_USERNAME=admin@example.com
      - LABEL_STUDIO_PASSWORD=mlops123
      - LABEL_STUDIO_USER_TOKEN=4c5c6e9a5c5c42458204e855a68a0fcd4c5c6e9a
      - LABEL_STUDIO_ENABLE_LEGACY_API_TOKEN=true
      - SECRET_KEY=mlops-secret-key-123
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/
    restart: unless-stopped

  # S3-compatible Remote Storage (Apache 2.0)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
    volumes:
      - ../dvc-storage:/data
      - ./rustfs_logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:9000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Helper to automatically create the required production bucket
  create_buckets:
    image: minio/mc
    container_name: bucket_creator
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myrustfs http://rustfs:9000 rustfsadmin rustfsadmin;
      mc mb myrustfs/mlflow-prod-artifacts || true;
      exit 0;
      "

services:
  # Unified MLflow Instance
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    user: "501:20"
    ports:
      - "5555:5000"
    working_dir: /mlflow/data
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin
      - MLFLOW_S3_ENDPOINT_URL=http://rustfs:9000
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - ../mlflow-history:/mlflow/data
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:////mlflow/data/mlflow.db --default-artifact-root mlflow-artifacts:/ --serve-artifacts

  # Human-in-the-Loop Labeling
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8080:8080"
    volumes:
      - ../label_studio_data:/label-studio/data
      - ../data:/label-studio/data/projects-data
    environment:
      - DJANGO_DB=default
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data/projects-data

  # S3 Compatible Storage (RustFS)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_VOLUMES=/data
    volumes:
      - ../dvc-storage:/data

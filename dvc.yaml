stages:
  preprocess:
    cmd: python3 src/data/preprocess.py --img-size 224 --raw-dir data/raw --out-dir data/processed
    deps:
      - data/raw
      - src/data/preprocess.py
    outs:
      - data/processed
  
  train:
    cmd: python3 src/training/train.py --epochs ${train.epochs} --img-size ${train.img_size} --batch ${train.batch}
    deps:
      - data/processed
      - src/training/train.py
    outs:
      - data/yolo
    metrics:
      - metrics.json:
          cache: false
